<section class="hero" id="home" aria-label="Головний банер">
  <div class="container">
    <div class="hero__inner">
      <!-- Text content -->
      <div class="hero__content">
        <div class="hero__badge" aria-hidden="true">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173
                     6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792
                     c.197-.39.73-.39.927 0l2.184 4.327 4.898.696
                     c.441.062.612.636.282.95l-3.522 3.356.83 4.73
                     c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"
            />
          </svg>
          Виробник композитної арматури
        </div>

        <h1 class="hero__title">
          Композитна сітка<br />
          <em>для міцних рішень</em>
        </h1>

        <p class="hero__desc">
          Високоякісна композитна сітка для будівництва, огороджень, армування
          та інших потреб.
        </p>

        <!-- Feature pills -->
        <div class="hero__features" role="list" aria-label="Ключові переваги">
          <div class="hero__feature" role="listitem">
            <span class="hero__feature-dot" aria-hidden="true">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              </svg>
            </span>
            Міцність та надійність
          </div>
          <div class="hero__feature" role="listitem">
            <span class="hero__feature-dot" aria-hidden="true">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5M2 12l10 5 10-5" />
              </svg>
            </span>
            Стійкість до корозії та хімії
          </div>
          <div class="hero__feature" role="listitem">
            <span class="hero__feature-dot" aria-hidden="true">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
            </span>
            Довговічність до 50 років
          </div>
        </div>

        <!-- CTA buttons -->
        <div class="hero__actions">
          <a href="#contact" class="btn btn--primary">Замовити зараз</a>
          <a href="#about" class="btn btn--outline">
            Дізнатись більше
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </a>
        </div>
      </div>
      <!-- /hero__content -->

      <!-- Visual — composite mesh roll (inline SVG) -->
      <div class="hero__visual" aria-hidden="true">
        <svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="roll-body" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#2e2e2e" />
              <stop offset="100%" stop-color="#0f0f0f" />
            </linearGradient>
            <linearGradient id="roll-cap" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#3d3d3d" />
              <stop offset="100%" stop-color="#1f1f1f" />
            </linearGradient>
            <pattern
              id="mesh-pat"
              x="0"
              y="0"
              width="20"
              height="20"
              patternUnits="userSpaceOnUse"
            >
              <rect width="20" height="20" fill="#1e1e1e" />
              <line
                x1="0"
                y1="0"
                x2="20"
                y2="0"
                stroke="#3a3a3a"
                stroke-width="2"
              />
              <line
                x1="0"
                y1="10"
                x2="20"
                y2="10"
                stroke="#2e2e2e"
                stroke-width="1"
              />
              <line
                x1="0"
                y1="0"
                x2="0"
                y2="20"
                stroke="#3a3a3a"
                stroke-width="2"
              />
              <line
                x1="10"
                y1="0"
                x2="10"
                y2="20"
                stroke="#2e2e2e"
                stroke-width="1"
              />
            </pattern>
            <clipPath id="roll-clip">
              <ellipse cx="390" cy="195" rx="52" ry="125" />
            </clipPath>
            <radialGradient id="roll-shine" cx="35%" cy="35%">
              <stop offset="0%" stop-color="rgba(255,255,255,.08)" />
              <stop offset="100%" stop-color="rgba(255,255,255,0)" />
            </radialGradient>
          </defs>

          <!-- Flat mesh sheet -->
          <g transform="translate(10,205) skewX(-6) skewY(-1)">
            <rect width="310" height="168" rx="4" fill="url(#mesh-pat)" />
            <rect width="310" height="2.5" fill="#484848" />
            <rect y="165.5" width="310" height="2.5" fill="#252525" />
          </g>

          <!-- Roll body -->
          <ellipse cx="390" cy="195" rx="52" ry="125" fill="url(#roll-body)" />

          <!-- Grid lines on roll (clipped) -->
          <g clip-path="url(#roll-clip)" opacity=".55">
            <line
              x1="360"
              y1="70"
              x2="360"
              y2="320"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="375"
              y1="70"
              x2="375"
              y2="320"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="390"
              y1="70"
              x2="390"
              y2="320"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="405"
              y1="70"
              x2="405"
              y2="320"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="420"
              y1="70"
              x2="420"
              y2="320"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="340"
              y1="130"
              x2="440"
              y2="130"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="340"
              y1="155"
              x2="440"
              y2="155"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="340"
              y1="180"
              x2="440"
              y2="180"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="340"
              y1="205"
              x2="440"
              y2="205"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="340"
              y1="230"
              x2="440"
              y2="230"
              stroke="#454545"
              stroke-width="1.5"
            />
            <line
              x1="340"
              y1="255"
              x2="440"
              y2="255"
              stroke="#454545"
              stroke-width="1.5"
            />
          </g>

          <!-- Shine on roll -->
          <ellipse cx="390" cy="195" rx="52" ry="125" fill="url(#roll-shine)" />

          <!-- Roll top cap -->
          <ellipse cx="390" cy="70" rx="52" ry="15" fill="url(#roll-cap)" />
          <ellipse cx="390" cy="70" rx="36" ry="10" fill="#252525" />

          <!-- Inner hole -->
          <ellipse cx="390" cy="195" rx="20" ry="48" fill="#0a0a0a" />

          <!-- Ground shadow -->
          <ellipse cx="350" cy="375" rx="170" ry="18" fill="rgba(0,0,0,.12)" />
        </svg>
      </div>
      <!-- /hero__visual -->
    </div>
  </div>
</section>
