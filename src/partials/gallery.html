<section class="gallery section" id="gallery" aria-labelledby="gallery-title">
  <div class="container">
    <div class="gallery__head reveal">
      <p class="label">Галерея</p>
      <h2 class="section-title" id="gallery-title">Фото нашої сітки</h2>
    </div>

    <div class="gallery__grid reveal" role="list" aria-label="Фото продукції">
      <!-- Item 1 — large (spans 2 rows on tablet+) -->
      <div
        class="gallery__item"
        role="listitem"
        aria-label="Плоска сітка крупним планом"
      >
        <svg
          viewBox="0 0 400 440"
          xmlns="http://www.w3.org/2000/svg"
          style="width: 100%; height: 100%"
          role="img"
          aria-hidden="true"
        >
          <defs>
            <pattern
              id="gp1"
              width="18"
              height="18"
              patternUnits="userSpaceOnUse"
            >
              <rect width="18" height="18" fill="#1e1e1e" />
              <line
                x1="0"
                y1="0"
                x2="18"
                y2="0"
                stroke="#3c3c3c"
                stroke-width="2.5"
              />
              <line
                x1="0"
                y1="9"
                x2="18"
                y2="9"
                stroke="#2a2a2a"
                stroke-width="1"
              />
              <line
                x1="0"
                y1="0"
                x2="0"
                y2="18"
                stroke="#3c3c3c"
                stroke-width="2.5"
              />
              <line
                x1="9"
                y1="0"
                x2="9"
                y2="18"
                stroke="#2a2a2a"
                stroke-width="1"
              />
            </pattern>
          </defs>
          <rect width="400" height="440" fill="url(#gp1)" />
          <radialGradient id="glow1" cx="50%" cy="50%">
            <stop offset="0%" stop-color="rgba(58,125,68,.18)" />
            <stop offset="100%" stop-color="rgba(0,0,0,0)" />
          </radialGradient>
          <rect width="400" height="440" fill="url(#glow1)" />
        </svg>
        <div class="gallery__overlay" aria-hidden="true"></div>
      </div>

      <!-- Item 2 -->
      <div class="gallery__item" role="listitem" aria-label="Рулон сітки">
        <svg
          viewBox="0 0 200 200"
          xmlns="http://www.w3.org/2000/svg"
          style="width: 100%; height: 100%"
          aria-hidden="true"
        >
          <rect width="200" height="200" fill="#141414" />
          <ellipse
            cx="100"
            cy="105"
            rx="65"
            ry="85"
            fill="#252525"
            stroke="#3a3a3a"
            stroke-width="2"
          />
          <ellipse
            cx="100"
            cy="20"
            rx="65"
            ry="18"
            fill="#2f2f2f"
            stroke="#444"
            stroke-width="1.5"
          />
          <ellipse cx="100" cy="105" rx="24" ry="32" fill="#0d0d0d" />
          <line
            x1="76"
            y1="20"
            x2="76"
            y2="190"
            stroke="#3a3a3a"
            stroke-width="1.2"
          />
          <line
            x1="100"
            y1="20"
            x2="100"
            y2="190"
            stroke="#3a3a3a"
            stroke-width="1.2"
          />
          <line
            x1="124"
            y1="20"
            x2="124"
            y2="190"
            stroke="#3a3a3a"
            stroke-width="1.2"
          />
        </svg>
        <div class="gallery__overlay" aria-hidden="true"></div>
      </div>

      <!-- Item 3 -->
      <div
        class="gallery__item"
        role="listitem"
        aria-label="Огородження з сітки"
      >
        <svg
          viewBox="0 0 200 200"
          xmlns="http://www.w3.org/2000/svg"
          style="width: 100%; height: 100%"
          aria-hidden="true"
        >
          <rect width="200" height="200" fill="#2a4a35" />
          <pattern
            id="gp3"
            width="16"
            height="16"
            patternUnits="userSpaceOnUse"
          >
            <rect width="16" height="16" fill="#2d5038" />
            <rect
              x="2"
              y="2"
              width="12"
              height="12"
              fill="none"
              stroke="#3a6b45"
              stroke-width="1"
            />
          </pattern>
          <rect width="200" height="200" fill="url(#gp3)" />
          <rect x="8" y="55" width="7" height="130" rx="1" fill="#1a3028" />
          <rect x="96" y="55" width="7" height="130" rx="1" fill="#1a3028" />
          <rect x="184" y="55" width="7" height="130" rx="1" fill="#1a3028" />
          <rect x="8" y="75" width="183" height="4" rx="1" fill="#1a3028" />
          <rect x="8" y="115" width="183" height="4" rx="1" fill="#1a3028" />
          <rect x="8" y="155" width="183" height="4" rx="1" fill="#1a3028" />
        </svg>
        <div class="gallery__overlay" aria-hidden="true"></div>
      </div>

      <!-- Item 4 -->
      <div
        class="gallery__item"
        role="listitem"
        aria-label="Сітка для армування бетону"
      >
        <svg
          viewBox="0 0 200 200"
          xmlns="http://www.w3.org/2000/svg"
          style="width: 100%; height: 100%"
          aria-hidden="true"
        >
          <rect width="200" height="200" fill="#555" />
          <pattern
            id="gp4a"
            width="10"
            height="10"
            patternUnits="userSpaceOnUse"
          >
            <rect width="10" height="10" fill="#555" />
            <rect x="0" y="0" width="5" height="5" fill="#5e5e5e" />
            <rect x="5" y="5" width="5" height="5" fill="#5e5e5e" />
          </pattern>
          <rect width="200" height="200" fill="url(#gp4a)" />
          <rect
            x="18"
            y="95"
            width="164"
            height="68"
            rx="2"
            fill="rgba(0,0,0,.15)"
          />
          <pattern
            id="gp4b"
            width="14"
            height="14"
            patternUnits="userSpaceOnUse"
          >
            <line
              x1="0"
              y1="7"
              x2="14"
              y2="7"
              stroke="rgba(15,15,15,.75)"
              stroke-width="2.2"
            />
            <line
              x1="7"
              y1="0"
              x2="7"
              y2="14"
              stroke="rgba(15,15,15,.75)"
              stroke-width="2.2"
            />
          </pattern>
          <rect x="18" y="95" width="164" height="68" fill="url(#gp4b)" />
        </svg>
        <div class="gallery__overlay" aria-hidden="true"></div>
      </div>

      <!-- Item 5 -->
      <div
        class="gallery__item"
        role="listitem"
        aria-label="Композитна сітка в розрізі"
      >
        <svg
          viewBox="0 0 200 200"
          xmlns="http://www.w3.org/2000/svg"
          style="width: 100%; height: 100%"
          aria-hidden="true"
        >
          <rect width="200" height="200" fill="#111" />
          <pattern
            id="gp5"
            width="22"
            height="22"
            patternUnits="userSpaceOnUse"
          >
            <rect width="22" height="22" fill="#181818" />
            <line
              x1="0"
              y1="11"
              x2="22"
              y2="11"
              stroke="#383838"
              stroke-width="3"
            />
            <line
              x1="11"
              y1="0"
              x2="11"
              y2="22"
              stroke="#383838"
              stroke-width="3"
            />
          </pattern>
          <rect width="200" height="200" fill="url(#gp5)" />
          <radialGradient id="glow5" cx="50%" cy="50%">
            <stop offset="0%" stop-color="rgba(58,125,68,.15)" />
            <stop offset="100%" stop-color="rgba(0,0,0,0)" />
          </radialGradient>
          <rect width="200" height="200" fill="url(#glow5)" />
        </svg>
        <div class="gallery__overlay" aria-hidden="true"></div>
      </div>
    </div>
  </div>
</section>
