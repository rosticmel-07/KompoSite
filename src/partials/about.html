<section class="about section" id="about" aria-labelledby="about-title">
  <div class="container">
    <div class="about__inner">
      <div class="about__visual reveal">
        <svg
          viewBox="0 0 380 320"
          xmlns="http://www.w3.org/2000/svg"
          style="width: 100%; border-radius: 18px"
          role="img"
          aria-label="Зображення композитної сітки"
        >
          <defs>
            <pattern
              id="aboutMesh"
              width="24"
              height="24"
              patternUnits="userSpaceOnUse"
            >
              <rect width="24" height="24" fill="#181818" />
              <line
                x1="0"
                y1="0"
                x2="24"
                y2="0"
                stroke="#3d3d3d"
                stroke-width="3"
              />
              <line
                x1="0"
                y1="12"
                x2="24"
                y2="12"
                stroke="#2d2d2d"
                stroke-width="1"
              />
              <line
                x1="0"
                y1="0"
                x2="0"
                y2="24"
                stroke="#3d3d3d"
                stroke-width="3"
              />
              <line
                x1="12"
                y1="0"
                x2="12"
                y2="24"
                stroke="#2d2d2d"
                stroke-width="1"
              />
            </pattern>
            <radialGradient id="aboutGlow" cx="50%" cy="50%">
              <stop offset="0%" stop-color="rgba(58,125,68,.22)" />
              <stop offset="100%" stop-color="rgba(0,0,0,0)" />
            </radialGradient>
          </defs>
          <rect width="380" height="320" rx="18" fill="url(#aboutMesh)" />
          <rect width="380" height="320" rx="18" fill="url(#aboutGlow)" />
          <text
            x="190"
            y="168"
            text-anchor="middle"
            font-family="Oswald,sans-serif"
            font-size="20"
            fill="rgba(255,255,255,.1)"
            letter-spacing="4"
          >
            COMPOSITE MESH
          </text>
        </svg>
      </div>

      <div class="about__content reveal">
        <div class="about__head">
          <p class="label">Опис сітки</p>
          <h2 class="section-title" id="about-title">
            Що таке композитна сітка?
          </h2>
        </div>
        <ul class="about__list" role="list">
          <li class="about__item">
            <span class="about__item-check" aria-hidden="true">
              <svg width="10" height="10" viewBox="0 0 12 10" fill="none">
                <polyline
                  points="1 5 4.5 8.5 11 1.5"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            Не іржавіє та не гниє
          </li>
          <li class="about__item">
            <span class="about__item-check" aria-hidden="true">
              <svg width="10" height="10" viewBox="0 0 12 10" fill="none">
                <polyline
                  points="1 5 4.5 8.5 11 1.5"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            Легка в різанні та монтажі
          </li>
          <li class="about__item">
            <span class="about__item-check" aria-hidden="true">
              <svg width="10" height="10" viewBox="0 0 12 10" fill="none">
                <polyline
                  points="1 5 4.5 8.5 11 1.5"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            Стійка до лугів, кислот і солей
          </li>
          <li class="about__item">
            <span class="about__item-check" aria-hidden="true">
              <svg width="10" height="10" viewBox="0 0 12 10" fill="none">
                <polyline
                  points="1 5 4.5 8.5 11 1.5"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            Економічна та довговічна
          </li>
          <li class="about__item">
            <span class="about__item-check" aria-hidden="true">
              <svg width="10" height="10" viewBox="0 0 12 10" fill="none">
                <polyline
                  points="1 5 4.5 8.5 11 1.5"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            Висока міцність при малій вазі
          </li>
          <li class="about__item">
            <span class="about__item-check" aria-hidden="true">
              <svg width="10" height="10" viewBox="0 0 12 10" fill="none">
                <polyline
                  points="1 5 4.5 8.5 11 1.5"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            Підходить для різних сфер застосування
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
